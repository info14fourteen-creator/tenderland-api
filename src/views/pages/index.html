<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kortex Capital</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/styles/site-chrome.css">
    <link rel="stylesheet" href="/styles/auth.css">
  </head>
  <body class="has-mobile-nav">
    <div class="site-shell">
      <!-- SITE_HEADER -->

      <main class="auth-page">
        <section class="auth-card" aria-label="Авторизация">
          <div class="auth-tabs" role="tablist" aria-label="Режим авторизации">
            <button class="auth-tab is-active" type="button" data-auth-mode="login" role="tab" aria-selected="true">
              Вход
            </button>
            <button class="auth-tab" type="button" data-auth-mode="register" role="tab" aria-selected="false">
              Регистрация
            </button>
          </div>

          <form class="auth-form" data-auth-panel="login" novalidate>
            <label class="field">
              <span>Почта</span>
              <input name="email" type="email" autocomplete="email" placeholder="mail@company.com" required>
            </label>

            <label class="field">
              <span>Пароль</span>
              <input name="password" type="password" autocomplete="current-password" placeholder="Пароль" required>
            </label>

            <div class="auth-row">
              <label class="remember">
                <input name="remember" type="checkbox">
                <span>Запомнить на этом устройстве</span>
              </label>
            </div>

            <button class="primary-button" type="submit">
              <span>Войти</span>
            </button>

            <button class="link-button forgot-link" type="button" data-forgot-password>
              Забыли пароль?
            </button>
          </form>

          <form class="auth-form is-hidden" data-auth-panel="register" novalidate>
            <label class="field">
              <span>Почта</span>
              <input name="email" type="email" autocomplete="email" placeholder="mail@company.com" required>
            </label>

            <label class="field">
              <span>Код приглашения</span>
              <input name="inviteCode" type="text" autocomplete="one-time-code" placeholder="Код приглашения" required>
            </label>

            <label class="consent">
              <input name="acceptedTerms" type="checkbox" required>
              <span>
                Ознакомлен(а) и согласен(на) с
                <a href="/terms" target="_blank" rel="noopener">условиями работы</a>
                и
                <a href="/privacy" target="_blank" rel="noopener">политикой конфиденциальности</a>
              </span>
            </label>

            <button class="primary-button" type="submit">
              <span>Зарегистрироваться</span>
            </button>

            <a class="terms-link" href="/terms">Условия работы</a>
          </form>

          <p class="auth-status" role="status" aria-live="polite"></p>
        </section>
      </main>

      <!-- SITE_FOOTER -->

      <nav class="mobile-nav" aria-label="Мобильное меню">
        <a class="mobile-nav-item is-active" href="/" aria-label="Главная" aria-current="page">
          <span class="mobile-nav-icon" data-mobile-nav-lottie data-lottie-path="/assets/mobile-home.json" aria-hidden="true"></span>
          <span>Главная</span>
        </a>
        <a class="mobile-nav-item" href="/" aria-label="Задачи">
          <span class="mobile-nav-icon" data-mobile-nav-lottie data-lottie-path="/assets/mobile-tasks.json" aria-hidden="true"></span>
          <span>Задачи</span>
        </a>
        <a class="mobile-nav-item is-primary" href="/" aria-label="Меню">
          <span class="mobile-nav-icon" data-mobile-nav-lottie data-lottie-path="/assets/mobile-menu.json" aria-hidden="true"></span>
          <span>Меню</span>
        </a>
        <a class="mobile-nav-item" href="/" aria-label="Поиск">
          <span class="mobile-nav-icon" data-mobile-nav-lottie data-lottie-path="/assets/mobile-search.json" aria-hidden="true"></span>
          <span>Поиск</span>
        </a>
        <a class="mobile-nav-item" href="/" aria-label="Помощь">
          <span class="mobile-nav-icon" data-mobile-nav-lottie data-lottie-path="/assets/mobile-help.json" aria-hidden="true"></span>
          <span>Помощь</span>
        </a>
      </nav>
    </div>

    <script src="/vendor/lottie.min.js"></script>
    <script src="/js/lottie-loader.js"></script>
    <script src="/js/auth-page.js"></script>
  </body>
</html>
